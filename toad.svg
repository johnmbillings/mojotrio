<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bufo / Incilius alvarius. Side profile facing left, squat desert sit.
       Distinctive silhouette: low snout, eye, then the BIG parotoid
       gland bump rising prominently behind the eye, then long flat back. -->
  <!-- top contour: snout up over eye, then sharp rise to parotoid peak, then long shallow slope to rump -->
  <path d="M8,50 C8,44 12,38 18,36 C24,34 28,32 32,32
           C36,26 44,22 52,24 C60,26 64,32 64,38
           C76,38 92,40 108,44 C120,48 130,52 132,58"
        stroke-width="1.6"/>
  <!-- belly / sit line: wide and flat, suggesting heavy ground contact -->
  <path d="M8,54 C16,68 32,72 64,72 C100,72 124,68 132,58"
        stroke-width="1.5"/>
  <!-- the parotoid gland — drawn separately as a defined kidney shape -->
  <path d="M40,28 C44,22 56,22 62,26 C66,30 64,38 58,40 C50,42 42,40 38,36 C36,32 38,30 40,28 Z"
        stroke-width="1.1"/>
  <!-- a faint dorsal line giving sense of back -->
  <path d="M68,42 C84,42 102,46 118,52" stroke-width="0.7" opacity="0.45"/>
  <!-- eye, golden/round -->
  <circle cx="24" cy="42" r="3.2" stroke-width="1.2"/>
  <circle cx="24" cy="42" r="1.1" fill="currentColor" stroke="none"/>
  <!-- pronounced mouth line -->
  <path d="M8,48 C12,53 20,55 28,52" stroke-width="1.1"/>
  <!-- nostril dot -->
  <circle cx="12" cy="42" r="0.8" fill="currentColor" stroke="none"/>
  <!-- front foot hint, toes splayed -->
  <path d="M30,72 C28,76 30,78 34,77 M36,72 C36,76 38,78 40,77" stroke-width="0.9"/>
  <!-- rear foot hint -->
  <path d="M104,72 C104,76 108,78 112,76 M114,72 C116,76 120,78 122,75" stroke-width="0.9"/>
  <!-- a few warts on the back, faint -->
  <circle cx="78" cy="46" r="0.7" fill="currentColor" stroke="none" opacity="0.5"/>
  <circle cx="92" cy="48" r="0.8" fill="currentColor" stroke="none" opacity="0.5"/>
  <circle cx="106" cy="52" r="0.7" fill="currentColor" stroke="none" opacity="0.45"/>
  <circle cx="86" cy="58" r="0.6" fill="currentColor" stroke="none" opacity="0.4"/>
  <circle cx="100" cy="60" r="0.7" fill="currentColor" stroke="none" opacity="0.4"/>
</svg>
