<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Phyllomedusa bicolor, side profile facing left.
       The body silhouette emphasizes the perched arboreal pose:
       compact head with prominent eye, slim back, characteristic
       angled haunch creating a clear bump at the rear. -->
  <!-- top contour: snout -> over eye -> down neck -> up over haunch -> down rump -->
  <path d="M10,52 C10,42 16,32 26,28 C36,24 48,24 56,30 C60,34 60,40 60,46 C60,54 64,58 70,60 C82,64 90,78 88,94 C86,108 76,118 64,118"
        stroke-width="1.6"/>
  <!-- belly contour: chin -> under -> back up at rump -->
  <path d="M10,56 C12,68 14,82 22,94 C32,108 50,114 64,118"
        stroke-width="1.5"/>
  <!-- characteristic crease line where haunch joins body -->
  <path d="M58,52 C62,58 66,60 70,60" stroke-width="0.7" opacity="0.5"/>
  <!-- eye -->
  <ellipse cx="28" cy="40" rx="5" ry="4.5" stroke-width="1.3"/>
  <ellipse cx="28" cy="40" rx="0.9" ry="3" fill="currentColor" stroke="none"/>
  <!-- mouth -->
  <path d="M10,50 C14,53 20,53 24,50" stroke-width="1"/>
  <!-- nostril -->
  <circle cx="15" cy="46" r="0.7" fill="currentColor" stroke="none"/>
  <!-- front limb folded under, fingers reaching down -->
  <path d="M30,72 C24,82 22,98 28,108 C32,114 40,116 46,112" stroke-width="1.2"/>
  <circle cx="42" cy="114" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="46" cy="113" r="1.3" fill="currentColor" stroke="none"/>
  <circle cx="50" cy="114" r="1.2" fill="currentColor" stroke="none"/>
  <!-- inner haunch fold suggesting bent knee -->
  <path d="M68,72 C72,82 70,94 64,100" stroke-width="0.9" opacity="0.6"/>
  <!-- rear toes peeking from under -->
  <circle cx="64" cy="120" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="68" cy="121" r="1.3" fill="currentColor" stroke="none"/>
  <circle cx="72" cy="122" r="1.2" fill="currentColor" stroke="none"/>
</svg>
