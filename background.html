<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>background</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const PI = Math.PI;

  let seed = 42;
  function rand() {
    seed = (seed * 16807) % 2147483647;
    return seed / 2147483647;
  }

  function colorAt(x, y, w, h) {
    const t = Math.max(0, Math.min(1, (y / h) + (x / w) * 0.12));
    const stops = [
      { p: 0,    r: 195, g: 85,  b: 38 },
      { p: 0.18, r: 190, g: 110, b: 42 },
      { p: 0.32, r: 168, g: 135, b: 45 },
      { p: 0.46, r: 120, g: 148, b: 55 },
      { p: 0.58, r: 70,  g: 142, b: 78 },
      { p: 0.7,  r: 42,  g: 125, b: 100 },
      { p: 0.82, r: 25,  g: 100, b: 105 },
      { p: 1,    r: 12,  g: 68,  b: 85 }
    ];
    let i = 0;
    while (i < stops.length - 2 && stops[i + 1].p < t) i++;
    const a = stops[i], b = stops[i + 1];
    const f = Math.max(0, Math.min(1, (t - a.p) / (b.p - a.p)));
    return `rgb(${Math.round(a.r + (b.r - a.r) * f)},${Math.round(a.g + (b.g - a.g) * f)},${Math.round(a.b + (b.b - a.b) * f)})`;
  }

  function draw() {
    const w = canvas.width = window.innerWidth;
    const h = canvas.height = window.innerHeight;
    const S = 62;
    const r = S / 2;
    const cols = Math.ceil(w / S) + 2;
    const rows = Math.ceil(h / S) + 2;

    // Pass 1: fill cells
    seed = 42;
    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        const x = col * S;
        const y = row * S;
        const orient = rand() > 0.5;

        // Fill tile background
        ctx.fillStyle = colorAt(x + S * 0.5, y + S * 0.5, w, h);
        ctx.fillRect(x, y, S, S);

        if (orient) {
          // Lobes at top-left and bottom-right
          ctx.fillStyle = colorAt(x + r * 0.3, y + r * 0.3, w, h);
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.arc(x, y, r, 0, PI / 2);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = colorAt(x + S - r * 0.3, y + S - r * 0.3, w, h);
          ctx.beginPath();
          ctx.moveTo(x + S, y + S);
          ctx.arc(x + S, y + S, r, PI, PI * 1.5);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.fillStyle = colorAt(x + S - r * 0.3, y + r * 0.3, w, h);
          ctx.beginPath();
          ctx.moveTo(x + S, y);
          ctx.arc(x + S, y, r, PI / 2, PI);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = colorAt(x + r * 0.3, y + S - r * 0.3, w, h);
          ctx.beginPath();
          ctx.moveTo(x, y + S);
          ctx.arc(x, y + S, r, PI * 1.5, PI * 2);
          ctx.closePath();
          ctx.fill();
        }
      }
    }

    // Pass 2: draw outlines
    seed = 42;
    ctx.lineWidth = 1.1;
    ctx.lineCap = 'round';

    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        const x = col * S;
        const y = row * S;
        const orient = rand() > 0.5;
        const t = (y / h + (x / w) * 0.12);
        ctx.strokeStyle = `rgba(0,0,0,${0.18 + t * 0.14})`;

        if (orient) {
          ctx.beginPath();
          ctx.arc(x, y, r, 0, PI / 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(x + S, y + S, r, PI, PI * 1.5);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(x + S, y, r, PI / 2, PI);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(x, y + S, r, PI * 1.5, PI * 2);
          ctx.stroke();
        }
      }
    }
  }

  window.addEventListener('resize', draw);
  draw();
</script>
</body>
</html>
