<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>background</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const PI = Math.PI;

  let seed = 42;
  function rand() {
    seed = (seed * 16807) % 2147483647;
    return seed / 2147483647;
  }

  const stops = [
    { p: 0,    r: 200, g: 80,  b: 32 },
    { p: 0.14, r: 195, g: 105, b: 36 },
    { p: 0.28, r: 178, g: 132, b: 40 },
    { p: 0.42, r: 140, g: 142, b: 48 },
    { p: 0.54, r: 95,  g: 135, b: 68 },
    { p: 0.66, r: 50,  g: 120, b: 95 },
    { p: 0.78, r: 30,  g: 98,  b: 105 },
    { p: 0.9,  r: 18,  g: 78,  b: 95 },
    { p: 1,    r: 12,  g: 62,  b: 80 }
  ];

  function sampleRGB(t) {
    t = Math.max(0, Math.min(1, t));
    let i = 0;
    while (i < stops.length - 2 && stops[i + 1].p < t) i++;
    const a = stops[i], b = stops[i + 1];
    const f = (t - a.p) / (b.p - a.p);
    return [
      a.r + (b.r - a.r) * f,
      a.g + (b.g - a.g) * f,
      a.b + (b.b - a.b) * f
    ];
  }

  function rgb(r, g, b) {
    return `rgb(${Math.round(Math.max(0, Math.min(255, r)))},${Math.round(Math.max(0, Math.min(255, g)))},${Math.round(Math.max(0, Math.min(255, b)))})`;
  }

  function draw() {
    const w = canvas.width = window.innerWidth;
    const h = canvas.height = window.innerHeight;
    const S = 58;
    const r = S / 2;
    const cols = Math.ceil(w / S) + 2;
    const rows = Math.ceil(h / S) + 2;

    // Pass 1: fill cells
    seed = 42;
    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        const x = col * S;
        const y = row * S;
        const orient = rand() > 0.5 ? 1 : 0;

        // Per-tile random shift creates stained-glass variation
        const n = (rand() - 0.5) * 2; // -1 to 1

        // Channel (tile background) — base gradient + cool shift
        const ct = (y + S / 2) / h + (x + S / 2) / w * 0.1;
        const cc = sampleRGB(ct);
        ctx.fillStyle = rgb(cc[0] - n * 12, cc[1] - n * 4, cc[2] + n * 8);
        ctx.fillRect(x, y, S, S);

        // Lobes — sampled at lobe position + warm shift (opposite of channel)
        const lobes = orient
          ? [[x, y, 0, PI / 2], [x + S, y + S, PI, PI * 1.5]]
          : [[x + S, y, PI / 2, PI], [x, y + S, PI * 1.5, PI * 2]];

        for (const [cx, cy, sa, ea] of lobes) {
          const lt = cy / h + cx / w * 0.1;
          const lc = sampleRGB(lt);
          ctx.fillStyle = rgb(lc[0] + n * 12, lc[1] + n * 4, lc[2] - n * 8);
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, sa, ea);
          ctx.closePath();
          ctx.fill();
        }
      }
    }

    // Pass 2: draw outlines
    seed = 42;
    ctx.lineWidth = 1.3;
    ctx.lineCap = 'round';

    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        const x = col * S;
        const y = row * S;
        const orient = rand() > 0.5 ? 1 : 0;
        rand(); // consume the noise rand to stay in sync

        const t = (y + S / 2) / h;
        ctx.strokeStyle = `rgba(0,0,0,${0.22 + t * 0.13})`;

        if (orient) {
          ctx.beginPath(); ctx.arc(x, y, r, 0, PI / 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(x + S, y + S, r, PI, PI * 1.5); ctx.stroke();
        } else {
          ctx.beginPath(); ctx.arc(x + S, y, r, PI / 2, PI); ctx.stroke();
          ctx.beginPath(); ctx.arc(x, y + S, r, PI * 1.5, PI * 2); ctx.stroke();
        }
      }
    }
  }

  window.addEventListener('resize', draw);
  draw();
</script>
</body>
</html>
