<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>drone · mojo trio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    body { display: flex; flex-direction: column; }

    .drone-page {
      max-width: 36rem;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      width: 100%;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-display);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mute);
      text-decoration: none;
      padding: 0.5rem 0.85rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .back:hover { color: var(--ink); border-color: var(--line-strong); }

    .drone-head {
      text-align: center;
      margin: 3rem 0 2.5rem;
    }

    .drone-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(3rem, 10vw, 5rem);
      letter-spacing: -0.04em;
      margin: 0;
      text-transform: lowercase;
      background: var(--grad-warm);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 200% 200%;
      animation: gradientShift 8s ease-in-out infinite;
    }

    .drone-sub {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--ink-faint);
      margin: 0.75rem 0 0;
      font-family: var(--font-display);
    }

    .note-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin: 0 auto 2rem;
    }

    .note-btn {
      background: rgba(20, 16, 28, 0.5);
      border: 1px solid var(--line);
      color: var(--ink-mute);
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.15rem;
      padding: 1em 0.4em;
      cursor: pointer;
      border-radius: 0.75rem;
      transition: all 0.2s ease;
      line-height: 1.2;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .note-btn:hover {
      border-color: var(--line-strong);
      color: var(--ink);
      transform: translateY(-1px);
    }

    .note-btn.selected {
      border-color: var(--coral);
      color: var(--ink);
      background: rgba(255, 94, 106, 0.12);
      box-shadow: 0 0 0 1px var(--coral), 0 8px 24px -8px rgba(255, 94, 106, 0.45);
    }

    .note-btn .enharmonic {
      display: block;
      font-size: 0.7rem;
      color: var(--ink-faint);
      margin-top: 0.2em;
      font-weight: 400;
    }

    .note-btn.selected .enharmonic { color: var(--mango); }

    .octave-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      align-items: center;
      margin: 0 0 2rem;
    }

    .octave-label {
      font-family: var(--font-display);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--ink-faint);
      margin-right: 0.5rem;
    }

    .oct-btn {
      background: rgba(20, 16, 28, 0.5);
      border: 1px solid var(--line);
      color: var(--ink-mute);
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1rem;
      padding: 0.55em 1em;
      cursor: pointer;
      border-radius: 0.6rem;
      transition: all 0.2s ease;
    }

    .oct-btn:hover { border-color: var(--line-strong); color: var(--ink); }

    .oct-btn.selected {
      border-color: var(--lavender);
      color: var(--ink);
      background: rgba(184, 139, 255, 0.12);
    }

    .drone-status {
      text-align: center;
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
      margin: 0 0 1.25rem;
      min-height: 1.6em;
    }

    .drone-status.playing {
      color: var(--coral);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    .play-btn {
      display: block;
      margin: 0 auto;
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.04em;
      padding: 0.95em 2.5em;
      min-width: 12em;
      text-align: center;
      cursor: pointer;
      background: var(--ink);
      color: var(--bg);
      border: 1px solid var(--ink);
      border-radius: 999px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .play-btn:hover {
      transform: translateY(-2px);
      background: var(--mango);
      border-color: var(--mango);
      box-shadow: 0 12px 30px -10px rgba(255, 181, 71, 0.55);
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="drone-page">
    <a class="back" href="index.html">← back</a>

    <div class="drone-head">
      <h1 class="drone-title">drone</h1>
      <p class="drone-sub">root + fifth</p>
    </div>

    <div class="note-grid" id="notes"></div>

    <div class="octave-row">
      <span class="octave-label">octave</span>
      <button class="oct-btn" data-oct="2">2</button>
      <button class="oct-btn selected" data-oct="3">3</button>
      <button class="oct-btn" data-oct="4">4</button>
    </div>

    <p class="drone-status" id="status"></p>

    <button class="play-btn" id="play-btn">start drone</button>
  </div>

  <script>
    const NOTES = [
      { name: 'C',  alt: null },
      { name: 'C♯', alt: 'D♭' },
      { name: 'D',  alt: null },
      { name: 'D♯', alt: 'E♭' },
      { name: 'E',  alt: null },
      { name: 'F',  alt: null },
      { name: 'F♯', alt: 'G♭' },
      { name: 'G',  alt: null },
      { name: 'G♯', alt: 'A♭' },
      { name: 'A',  alt: null },
      { name: 'A♯', alt: 'B♭' },
      { name: 'B',  alt: null }
    ];

    function noteFreq(noteIndex, octave) {
      const midi = noteIndex + (octave + 1) * 12;
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    // perfect (just) fifth ratio — 3:2 keeps the drone beat-free
    const FIFTH_RATIO = 1.5;

    let audioCtx = null;
    let rootOsc = null, fifthOsc = null;
    let droneLfo = null;
    let droneFilter = null, droneGain = null;
    let formantA = null, formantB = null, bridgeHill = null;
    let rootLfoGain = null, fifthLfoGain = null;
    let isPlaying = false;
    let selectedNote = 0;
    let selectedOctave = 3;

    const notesGrid = document.getElementById('notes');
    const statusEl = document.getElementById('status');
    const playBtn = document.getElementById('play-btn');

    NOTES.forEach((note, i) => {
      const btn = document.createElement('button');
      btn.className = 'note-btn' + (i === 0 ? ' selected' : '');
      btn.dataset.note = i;
      let html = note.name;
      if (note.alt) html += '<span class="enharmonic">' + note.alt + '</span>';
      btn.innerHTML = html;
      btn.addEventListener('click', () => selectNote(i));
      notesGrid.appendChild(btn);
    });

    document.querySelectorAll('.oct-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.oct-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedOctave = parseInt(btn.dataset.oct, 10);
        if (isPlaying) updateDroneFreq();
        updateStatus();
      });
    });

    function selectNote(i) {
      selectedNote = i;
      document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('selected'));
      notesGrid.children[i].classList.add('selected');
      if (isPlaying) updateDroneFreq();
      updateStatus();
    }

    function currentFreq() {
      return noteFreq(selectedNote, selectedOctave);
    }

    function fifthLabel() {
      const fifthIdx = (selectedNote + 7) % 12;
      const fifthOct = selectedOctave + Math.floor((selectedNote + 7) / 12);
      return NOTES[fifthIdx].name + fifthOct;
    }

    function updateStatus() {
      const note = NOTES[selectedNote];
      const rootName = note.name + selectedOctave;
      if (isPlaying) {
        statusEl.textContent = rootName + ' · ' + fifthLabel();
        statusEl.className = 'drone-status playing';
      } else {
        statusEl.textContent = '';
        statusEl.className = 'drone-status';
      }
    }

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.onstatechange = () => {
        if (!audioCtx) return;
        // iOS suspends or interrupts the context when the screen turns off;
        // resume() can report success but no audio flows. Tear down so the
        // next "start drone" tap creates a fresh, working context.
        if (audioCtx.state === 'interrupted' || audioCtx.state === 'suspended') {
          if (isPlaying) stopDrone();
        }
      };
    }

    async function startDrone() {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      const root = currentFreq();
      const fifth = root * FIFTH_RATIO;

      rootOsc = audioCtx.createOscillator();
      fifthOsc = audioCtx.createOscillator();
      droneLfo = audioCtx.createOscillator();
      droneFilter = audioCtx.createBiquadFilter();
      formantA = audioCtx.createBiquadFilter();
      formantB = audioCtx.createBiquadFilter();
      bridgeHill = audioCtx.createBiquadFilter();
      droneGain = audioCtx.createGain();
      rootLfoGain = audioCtx.createGain();
      fifthLfoGain = audioCtx.createGain();

      rootOsc.type = 'sawtooth';
      rootOsc.frequency.value = root;
      fifthOsc.type = 'sawtooth';
      fifthOsc.frequency.value = fifth;

      // subtle vibrato
      droneLfo.frequency.value = 5.2;
      rootLfoGain.gain.value = root * 0.005;
      fifthLfoGain.gain.value = fifth * 0.005;
      droneLfo.connect(rootLfoGain);
      droneLfo.connect(fifthLfoGain);
      rootLfoGain.connect(rootOsc.frequency);
      fifthLfoGain.connect(fifthOsc.frequency);

      // global rolloff
      droneFilter.type = 'lowpass';
      droneFilter.frequency.value = 5000;
      droneFilter.Q.value = 0.7;

      // cello body resonances (approximate)
      // A0/T1 region — main "wood" resonance
      formantA.type = 'peaking';
      formantA.frequency.value = 250;
      formantA.Q.value = 4;
      formantA.gain.value = 8;
      // B1+ corpus modes
      formantB.type = 'peaking';
      formantB.frequency.value = 450;
      formantB.Q.value = 3;
      formantB.gain.value = 6;
      // "bridge hill" — gives cellos their projection around 1.5-2 kHz
      bridgeHill.type = 'peaking';
      bridgeHill.frequency.value = 1800;
      bridgeHill.Q.value = 2;
      bridgeHill.gain.value = 5;

      droneGain.gain.value = 0.35;

      rootOsc.connect(droneFilter);
      fifthOsc.connect(droneFilter);
      droneFilter.connect(formantA);
      formantA.connect(formantB);
      formantB.connect(bridgeHill);
      bridgeHill.connect(droneGain);
      droneGain.connect(audioCtx.destination);

      rootOsc.start();
      fifthOsc.start();
      droneLfo.start();

      isPlaying = true;
      playBtn.textContent = 'stop drone';
      updateStatus();
    }

    function stopDrone() {
      const oscs = [rootOsc, fifthOsc, droneLfo];
      oscs.forEach(o => { try { o.stop(); o.disconnect(); } catch (e) {} });

      rootOsc = null; fifthOsc = null;
      droneLfo = null;
      droneFilter = null; droneGain = null;
      formantA = null; formantB = null; bridgeHill = null;
      rootLfoGain = null; fifthLfoGain = null;

      isPlaying = false;
      playBtn.textContent = 'start drone';
      updateStatus();

      // Close the AudioContext so the next start builds a fresh one — iOS
      // can leave it in an unrecoverable state after screen lock.
      if (audioCtx) {
        const ctx = audioCtx;
        audioCtx = null;
        try { ctx.close(); } catch (e) {}
      }
    }

    function updateDroneFreq() {
      if (!rootOsc) return;
      const root = currentFreq();
      const fifth = root * FIFTH_RATIO;
      const now = audioCtx.currentTime;
      rootOsc.frequency.setTargetAtTime(root, now, 0.03);
      fifthOsc.frequency.setTargetAtTime(fifth, now, 0.03);
      rootLfoGain.gain.setTargetAtTime(root * 0.005, now, 0.03);
      fifthLfoGain.gain.setTargetAtTime(fifth * 0.005, now, 0.03);
    }

    playBtn.addEventListener('click', () => {
      if (!isPlaying) startDrone();
      else stopDrone();
    });
  </script>
</body>
</html>
