<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>drone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="song.css">
  <style>
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
      z-index: 10;
    }
    .back:hover { color: #d8d8ff; }
    .subtitle {
      font-size: 1rem;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: -1rem;
    }
    .note-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      width: min(420px, 88vw);
      margin: 0 auto;
    }
    .note-btn {
      background: none;
      border: 1px solid #444;
      color: #999;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.1rem;
      padding: 0.8em 0.4em;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      line-height: 1.3;
      text-align: center;
    }
    .note-btn:hover {
      border-color: #888;
      color: #ddd;
    }
    .note-btn.selected {
      border-color: #d8a08c;
      color: #fff;
      background: rgba(216, 160, 140, 0.12);
    }
    .note-btn .enharmonic {
      display: block;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      margin-top: 0.15em;
    }
    .note-btn.selected .enharmonic {
      color: rgba(255,255,255,0.5);
    }
    .octave-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin: 1.2rem 0;
      align-items: center;
    }
    .octave-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
      margin-right: 0.3rem;
    }
    .oct-btn {
      background: none;
      border: 1px solid #444;
      color: #888;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.1rem;
      padding: 0.4em 0.8em;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
    }
    .oct-btn:hover { border-color: #888; color: #ddd; }
    .oct-btn.selected {
      border-color: #8cb4d8;
      color: #fff;
      background: rgba(140, 180, 216, 0.12);
    }
    .drone-status {
      text-align: center;
      font-size: 1.2rem;
      color: rgba(255,255,255,0.3);
      margin: 1rem 0 0.5rem;
      min-height: 1.6em;
    }
    .drone-status.playing {
      color: #d8a08c;
    }
    .play-btn {
      display: block;
      margin: 0 auto;
      font-size: 1.3rem;
      padding: 0.6em 2em;
      min-width: 8em;
      text-align: center;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .drone-status.playing { animation: pulse 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="title">
    <span>drone</span>
    <img src="feather.svg" alt="" class="feather">
  </div>
  <p class="subtitle">sustained cello tone</p>

  <div class="note-grid" id="notes"></div>

  <div class="octave-row">
    <span class="octave-label">octave</span>
    <button class="oct-btn" data-oct="2">2</button>
    <button class="oct-btn selected" data-oct="3">3</button>
    <button class="oct-btn" data-oct="4">4</button>
  </div>

  <p class="drone-status" id="status"></p>

  <button class="play-btn" id="play-btn">start drone</button>

  <script>
    const NOTES = [
      { name: 'C',  alt: null },
      { name: 'C♯', alt: 'D♭' },
      { name: 'D',  alt: null },
      { name: 'D♯', alt: 'E♭' },
      { name: 'E',  alt: null },
      { name: 'F',  alt: null },
      { name: 'F♯', alt: 'G♭' },
      { name: 'G',  alt: null },
      { name: 'G♯', alt: 'A♭' },
      { name: 'A',  alt: null },
      { name: 'A♯', alt: 'B♭' },
      { name: 'B',  alt: null }
    ];

    // A4 = 440Hz. Semitone i relative to C0: freq = 440 * 2^((i - 57) / 12)
    function noteFreq(noteIndex, octave) {
      const midi = noteIndex + (octave + 1) * 12;
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    let audioCtx = null;
    let droneOsc1 = null, droneOsc2 = null, droneLfo = null;
    let droneFilter = null, droneGain = null, lfoGainNode = null;
    let isPlaying = false;
    let selectedNote = 0;
    let selectedOctave = 3;

    const notesGrid = document.getElementById('notes');
    const statusEl = document.getElementById('status');
    const playBtn = document.getElementById('play-btn');

    // Build note buttons
    NOTES.forEach((note, i) => {
      const btn = document.createElement('button');
      btn.className = 'note-btn' + (i === 0 ? ' selected' : '');
      btn.dataset.note = i;
      let html = note.name;
      if (note.alt) html += '<span class="enharmonic">' + note.alt + '</span>';
      btn.innerHTML = html;
      btn.addEventListener('click', () => selectNote(i));
      notesGrid.appendChild(btn);
    });

    // Octave buttons
    document.querySelectorAll('.oct-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.oct-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedOctave = parseInt(btn.dataset.oct, 10);
        if (isPlaying) updateDroneFreq();
        updateStatus();
      });
    });

    function selectNote(i) {
      selectedNote = i;
      document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('selected'));
      notesGrid.children[i].classList.add('selected');
      if (isPlaying) updateDroneFreq();
      updateStatus();
    }

    function currentFreq() {
      return noteFreq(selectedNote, selectedOctave);
    }

    function updateStatus() {
      const note = NOTES[selectedNote];
      const label = note.alt ? note.name + ' / ' + note.alt : note.name;
      if (isPlaying) {
        statusEl.textContent = label + selectedOctave;
        statusEl.className = 'drone-status playing';
      } else {
        statusEl.textContent = '';
        statusEl.className = 'drone-status';
      }
    }

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.onstatechange = () => {
        if ((audioCtx.state === 'interrupted' || audioCtx.state === 'suspended') && isPlaying) {
          stopDrone();
        }
      };
    }

    async function startDrone() {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      const freq = currentFreq();

      droneOsc1 = audioCtx.createOscillator();
      droneOsc2 = audioCtx.createOscillator();
      droneLfo = audioCtx.createOscillator();
      droneFilter = audioCtx.createBiquadFilter();
      droneGain = audioCtx.createGain();
      lfoGainNode = audioCtx.createGain();

      droneOsc1.type = 'sawtooth';
      droneOsc1.frequency.value = freq;
      droneOsc2.type = 'sawtooth';
      droneOsc2.frequency.value = freq * 1.003;

      droneLfo.frequency.value = 5.2;
      lfoGainNode.gain.value = freq * 0.005;
      droneLfo.connect(lfoGainNode);
      lfoGainNode.connect(droneOsc1.frequency);
      lfoGainNode.connect(droneOsc2.frequency);

      droneFilter.type = 'lowpass';
      droneFilter.frequency.value = Math.min(freq * 8, 4000);
      droneFilter.Q.value = 0.7;

      const now = audioCtx.currentTime;
      droneGain.gain.setValueAtTime(0.001, now);
      droneGain.gain.setTargetAtTime(0.45, now, 0.08);

      droneOsc1.connect(droneFilter);
      droneOsc2.connect(droneFilter);
      droneFilter.connect(droneGain);
      droneGain.connect(audioCtx.destination);

      droneOsc1.start();
      droneOsc2.start();
      droneLfo.start();

      isPlaying = true;
      playBtn.textContent = 'stop drone';
      updateStatus();
    }

    function stopDrone() {
      if (!droneGain) return;
      const now = audioCtx.currentTime;
      droneGain.gain.cancelScheduledValues(now);
      droneGain.gain.setValueAtTime(droneGain.gain.value, now);
      droneGain.gain.setTargetAtTime(0.001, now, 0.08);

      const oscs = [droneOsc1, droneOsc2, droneLfo];
      setTimeout(() => {
        oscs.forEach(o => { try { o.stop(); } catch (e) {} });
      }, 500);

      droneOsc1 = null; droneOsc2 = null; droneLfo = null;
      droneFilter = null; droneGain = null; lfoGainNode = null;

      isPlaying = false;
      playBtn.textContent = 'start drone';
      updateStatus();
    }

    function updateDroneFreq() {
      if (!droneOsc1) return;
      const freq = currentFreq();
      const now = audioCtx.currentTime;
      droneOsc1.frequency.setTargetAtTime(freq, now, 0.03);
      droneOsc2.frequency.setTargetAtTime(freq * 1.003, now, 0.03);
      lfoGainNode.gain.setTargetAtTime(freq * 0.005, now, 0.03);
      droneFilter.frequency.setTargetAtTime(Math.min(freq * 8, 4000), now, 0.03);
    }

    playBtn.addEventListener('click', () => {
      if (!isPlaying) startDrone();
      else stopDrone();
    });
  </script>
</body>
</html>
