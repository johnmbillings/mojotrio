<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>drone · mojo trio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      padding: 4rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .note-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      width: min(420px, 92vw);
      margin: 0 auto;
    }

    .note-btn {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink-mute);
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 400;
      padding: 0.85em 0.4em;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
      line-height: 1.2;
      text-align: center;
    }
    .note-btn:hover { color: var(--ink); border-color: var(--ink-mute); }
    .note-btn.selected {
      color: var(--ember);
      border-color: var(--ember);
    }
    .note-btn .enharmonic {
      display: block;
      font-size: 0.75rem;
      color: var(--ink-faint);
      font-style: italic;
      margin-top: 0.2em;
    }
    .note-btn.selected .enharmonic { color: var(--ember); opacity: 0.7; }

    .octave-row {
      display: flex;
      gap: 0.45rem;
      justify-content: center;
      align-items: center;
      margin-top: 0.5rem;
    }
    .octave-label {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-mute);
      margin-right: 0.4rem;
      letter-spacing: 0.06em;
    }
    .oct-btn {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink-mute);
      font-family: var(--font-serif);
      font-size: 1rem;
      padding: 0.4em 0.95em;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .oct-btn:hover { color: var(--ink); border-color: var(--ink-mute); }
    .oct-btn.selected { color: var(--ember); border-color: var(--ember); }

    .drone-status {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
      text-align: center;
      min-height: 1.6em;
      margin: 0.5rem 0 0;
    }
    .drone-status.playing { color: var(--ember); }

    .play-btn {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      padding: 0.6em 2em;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .play-btn:hover { color: var(--ember); border-color: var(--ember); }
  </style>
</head>
<body>
  <svg class="smoke smoke-bg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" viewBox="0 0 100 140">
    <defs>
      <filter id="bg-warp" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.035 0.08" numOctaves="2" seed="3" stitchTiles="stitch" result="noise">
          <animate attributeName="seed" values="3;203" dur="90s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" result="displaced"/>
        <feGaussianBlur in="displaced" stdDeviation="1.2"/>
      </filter>
      <radialGradient id="bg-puff" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="rgba(235,226,207,0.12)"/>
      <stop offset="50%" stop-color="rgba(235,226,207,0.05)"/>
      <stop offset="100%" stop-color="rgba(235,226,207,0)"/>
      </radialGradient>
    </defs>
    <g filter="url(#bg-warp)">
      <ellipse cx="8" cy="158" rx="4" ry="14" fill="url(#bg-puff)" opacity="0"><animate attributeName="cy" values="158;-102" dur="34s" begin="-2s" repeatCount="indefinite"/><animate attributeName="cx" values="8;11" dur="34s" begin="-2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.45;0" keyTimes="0;0.18;0.8;1" dur="34s" begin="-2s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="26" cy="158" rx="5" ry="16" fill="url(#bg-puff)" opacity="0"><animate attributeName="cy" values="158;-102" dur="30s" begin="-12s" repeatCount="indefinite"/><animate attributeName="cx" values="26;24" dur="30s" begin="-12s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.45;0" keyTimes="0;0.18;0.8;1" dur="30s" begin="-12s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="48" cy="158" rx="4" ry="13" fill="url(#bg-puff)" opacity="0"><animate attributeName="cy" values="158;-102" dur="38s" begin="-22s" repeatCount="indefinite"/><animate attributeName="cx" values="48;52" dur="38s" begin="-22s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.45;0" keyTimes="0;0.18;0.8;1" dur="38s" begin="-22s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="68" cy="158" rx="5" ry="15" fill="url(#bg-puff)" opacity="0"><animate attributeName="cy" values="158;-102" dur="32s" begin="-8s" repeatCount="indefinite"/><animate attributeName="cx" values="68;65" dur="32s" begin="-8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.45;0" keyTimes="0;0.18;0.8;1" dur="32s" begin="-8s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="90" cy="158" rx="4" ry="14" fill="url(#bg-puff)" opacity="0"><animate attributeName="cy" values="158;-102" dur="36s" begin="-26s" repeatCount="indefinite"/><animate attributeName="cx" values="90;92" dur="36s" begin="-26s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.45;0" keyTimes="0;0.18;0.8;1" dur="36s" begin="-26s" repeatCount="indefinite"/></ellipse>
    </g>
  </svg>
  <svg class="smoke smoke-fg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" viewBox="0 0 100 140">
    <defs>
      <filter id="fg-warp" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.025 0.06" numOctaves="2" seed="7" stitchTiles="stitch" result="noise">
          <animate attributeName="seed" values="7;207" dur="70s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" result="displaced"/>
        <feGaussianBlur in="displaced" stdDeviation="1.5"/>
      </filter>
      <radialGradient id="fg-puff" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="rgba(235,226,207,0.15)"/>
      <stop offset="50%" stop-color="rgba(235,226,207,0.06)"/>
      <stop offset="100%" stop-color="rgba(235,226,207,0)"/>
      </radialGradient>
    </defs>
    <g filter="url(#fg-warp)">
      <ellipse cx="18" cy="160" rx="7" ry="20" fill="url(#fg-puff)" opacity="0"><animate attributeName="cy" values="160;-100" dur="26s" begin="-10s" repeatCount="indefinite"/><animate attributeName="cx" values="18;22" dur="26s" begin="-10s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.45;0" keyTimes="0;0.18;0.8;1" dur="26s" begin="-10s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="54" cy="160" rx="8" ry="22" fill="url(#fg-puff)" opacity="0"><animate attributeName="cy" values="160;-100" dur="22s" begin="-18s" repeatCount="indefinite"/><animate attributeName="cx" values="54;50" dur="22s" begin="-18s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.45;0" keyTimes="0;0.18;0.8;1" dur="22s" begin="-18s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="82" cy="160" rx="6" ry="18" fill="url(#fg-puff)" opacity="0"><animate attributeName="cy" values="160;-100" dur="28s" begin="-2s" repeatCount="indefinite"/><animate attributeName="cx" values="82;85" dur="28s" begin="-2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.45;0" keyTimes="0;0.18;0.8;1" dur="28s" begin="-2s" repeatCount="indefinite"/></ellipse>
    </g>
  </svg>
<a class="back" href="index.html">← back</a>

  <div class="page-header">
    <h1>drone</h1>
    <p class="subtitle">root + fifth</p>
    <div class="marks-row" aria-hidden="true">
      <img class="m-spirit" src="feather.svg" alt="">
      <img class="m-frog"   src="frog.svg"    alt="">
      <img class="m-toad"   src="toad.svg"    alt="">
    </div>
  </div>

  <div class="note-grid" id="notes"></div>

  <div class="octave-row">
    <span class="octave-label">octave</span>
    <button class="oct-btn" data-oct="2">2</button>
    <button class="oct-btn selected" data-oct="3">3</button>
    <button class="oct-btn" data-oct="4">4</button>
  </div>

  <p class="drone-status" id="status"></p>
  <button class="play-btn" id="play-btn">start drone</button>

  <script>
    const NOTES = [
      { name: 'C',  alt: null },
      { name: 'C♯', alt: 'D♭' },
      { name: 'D',  alt: null },
      { name: 'D♯', alt: 'E♭' },
      { name: 'E',  alt: null },
      { name: 'F',  alt: null },
      { name: 'F♯', alt: 'G♭' },
      { name: 'G',  alt: null },
      { name: 'G♯', alt: 'A♭' },
      { name: 'A',  alt: null },
      { name: 'A♯', alt: 'B♭' },
      { name: 'B',  alt: null }
    ];

    function noteFreq(noteIndex, octave) {
      const midi = noteIndex + (octave + 1) * 12;
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    const FIFTH_RATIO = 1.5;

    let audioCtx = null;
    let rootOsc = null, fifthOsc = null;
    let droneFilter = null, droneGain = null;
    let formantA = null, formantB = null, bridgeHill = null;
    let noiseSource = null, noiseFilter = null, noiseGain = null;
    let isPlaying = false;
    let selectedNote = 0;
    let selectedOctave = 3;

    const notesGrid = document.getElementById('notes');
    const statusEl = document.getElementById('status');
    const playBtn = document.getElementById('play-btn');

    NOTES.forEach((note, i) => {
      const btn = document.createElement('button');
      btn.className = 'note-btn' + (i === 0 ? ' selected' : '');
      btn.dataset.note = i;
      let html = note.name;
      if (note.alt) html += '<span class="enharmonic">' + note.alt + '</span>';
      btn.innerHTML = html;
      btn.addEventListener('click', () => selectNote(i));
      notesGrid.appendChild(btn);
    });

    document.querySelectorAll('.oct-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.oct-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedOctave = parseInt(btn.dataset.oct, 10);
        if (isPlaying) updateDroneFreq();
        updateStatus();
      });
    });

    function selectNote(i) {
      selectedNote = i;
      document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('selected'));
      notesGrid.children[i].classList.add('selected');
      if (isPlaying) updateDroneFreq();
      updateStatus();
    }

    function currentFreq() {
      return noteFreq(selectedNote, selectedOctave);
    }

    function fifthLabel() {
      const fifthIdx = (selectedNote + 7) % 12;
      const fifthOct = selectedOctave + Math.floor((selectedNote + 7) / 12);
      return NOTES[fifthIdx].name + fifthOct;
    }

    function updateStatus() {
      const note = NOTES[selectedNote];
      const rootName = note.name + selectedOctave;
      if (isPlaying) {
        statusEl.textContent = rootName + ' · ' + fifthLabel();
        statusEl.className = 'drone-status playing';
      } else {
        statusEl.textContent = '';
        statusEl.className = 'drone-status';
      }
    }

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.onstatechange = () => {
        if (!audioCtx) return;
        if (audioCtx.state === 'interrupted' || audioCtx.state === 'suspended') {
          if (isPlaying) stopDrone();
        }
      };
    }

    async function startDrone() {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      const root = currentFreq();
      const fifth = root * FIFTH_RATIO;

      rootOsc = audioCtx.createOscillator();
      fifthOsc = audioCtx.createOscillator();
      droneFilter = audioCtx.createBiquadFilter();
      formantA = audioCtx.createBiquadFilter();
      formantB = audioCtx.createBiquadFilter();
      bridgeHill = audioCtx.createBiquadFilter();
      droneGain = audioCtx.createGain();

      rootOsc.type = 'sawtooth';
      rootOsc.frequency.value = root;
      fifthOsc.type = 'sawtooth';
      fifthOsc.frequency.value = fifth;

      droneFilter.type = 'lowpass';
      droneFilter.frequency.value = 5000;
      droneFilter.Q.value = 0.7;

      formantA.type = 'peaking';
      formantA.frequency.value = 250;
      formantA.Q.value = 4;
      formantA.gain.value = 8;
      formantB.type = 'peaking';
      formantB.frequency.value = 450;
      formantB.Q.value = 3;
      formantB.gain.value = 6;
      bridgeHill.type = 'peaking';
      bridgeHill.frequency.value = 1800;
      bridgeHill.Q.value = 2;
      bridgeHill.gain.value = 5;

      droneGain.gain.value = 0.35;

      // Sub-audible noise to keep car Bluetooth codecs from triggering
      // silence/static detection (which would otherwise duck a sustained
      // tone like this and produce audible pulsing). Put the noise in
      // the band BT codecs actually preserve (1-4 kHz) — putting it up
      // high (>6 kHz) is no good because SBC and similar codecs throw
      // those frequencies away before they reach the speaker.
      const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
      const noiseData = noiseBuf.getChannelData(0);
      for (let i = 0; i < noiseData.length; i++) noiseData[i] = Math.random() * 2 - 1;
      noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = noiseBuf;
      noiseSource.loop = true;
      noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 2000;
      noiseFilter.Q.value = 0.6;
      noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.012;

      rootOsc.connect(droneFilter);
      fifthOsc.connect(droneFilter);
      droneFilter.connect(formantA);
      formantA.connect(formantB);
      formantB.connect(bridgeHill);
      bridgeHill.connect(droneGain);
      noiseSource.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(droneGain);
      droneGain.connect(audioCtx.destination);

      rootOsc.start();
      fifthOsc.start();
      noiseSource.start();

      isPlaying = true;
      playBtn.textContent = 'stop drone';
      updateStatus();
    }

    function stopDrone() {
      const sources = [rootOsc, fifthOsc, noiseSource];
      sources.forEach(o => { try { o.stop(); o.disconnect(); } catch (e) {} });
      rootOsc = null; fifthOsc = null;
      noiseSource = null; noiseFilter = null; noiseGain = null;
      droneFilter = null; droneGain = null;
      formantA = null; formantB = null; bridgeHill = null;

      isPlaying = false;
      playBtn.textContent = 'start drone';
      updateStatus();

      if (audioCtx) {
        const ctx = audioCtx;
        audioCtx = null;
        try { ctx.close(); } catch (e) {}
      }
    }

    function updateDroneFreq() {
      if (!rootOsc) return;
      const root = currentFreq();
      const fifth = root * FIFTH_RATIO;
      const now = audioCtx.currentTime;
      rootOsc.frequency.setTargetAtTime(root, now, 0.03);
      fifthOsc.frequency.setTargetAtTime(fifth, now, 0.03);
    }

    playBtn.addEventListener('click', () => {
      if (!isPlaying) startDrone();
      else stopDrone();
    });
  </script>
</body>
</html>
