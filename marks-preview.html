<!DOCTYPE html>
<html><head><style>
body { background: #0e0a06; padding: 4rem; color: #ebe3d0; font-family: serif; text-align: center; }
.row { display:flex; gap: 3rem; justify-content: center; align-items: flex-end; }
.cell { display:flex; flex-direction: column; align-items: center; }
.mark { width: 56px; height: 80px; opacity: 0.85; }
.mark.small { width: 28px; height: 40px; }
img.mark { object-fit: contain; }
.label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: #8a7d68; margin-top: 0.6rem; }
.sep { margin-top: 3rem; }
</style></head>
<body>
<h2 style="font-weight:300; letter-spacing: 0.05em">trio marks — preview</h2>

<p class="sep">large</p>
<div class="row">
  <div class="cell"><img class="mark" src="/feather.svg"/><div class="label">spirit</div></div>
  <div class="cell"><img class="mark" src="/frog.svg"/><div class="label">frog</div></div>
  <div class="cell"><img class="mark" src="/toad.svg"/><div class="label">toad</div></div>
</div>

<p class="sep">small (real size)</p>
<div class="row">
  <div class="cell"><img class="mark small" src="/feather.svg"/></div>
  <div class="cell"><img class="mark small" src="/frog.svg"/></div>
  <div class="cell"><img class="mark small" src="/toad.svg"/></div>
</div>

</body></html>
