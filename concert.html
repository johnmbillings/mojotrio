<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>virtual concert · mojo trio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      padding: 4rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    #start-btn {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      padding: 0.55rem 1.9rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    #start-btn:hover { color: var(--ember); border-color: var(--ember); }

    .now-playing {
      font-family: var(--font-serif);
      font-style: italic;
      text-align: center;
      color: var(--ink-mute);
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
    }
    .now-playing .current {
      display: block;
      color: var(--ember);
      font-size: 1.3rem;
      letter-spacing: 0.04em;
      margin-top: 0.2rem;
      text-transform: lowercase;
    }

    .setlist {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0;
      width: min(420px, 92vw);
    }
    .setlist li {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--ink-mute);
      padding: 0.55rem 0.6rem;
      border-bottom: 1px solid var(--line);
      transition: color 0.3s ease, opacity 0.3s ease;
      cursor: pointer;
      text-transform: lowercase;
    }
    .setlist li .num {
      color: var(--ink-faint);
      font-variant-numeric: tabular-nums;
      margin-right: 0.5rem;
    }
    .setlist li.played { color: var(--ink-faint); opacity: 0.6; }
    .setlist li.active { color: var(--ember); }

    .loop-badge {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      text-align: center;
      min-height: 1.2em;
      margin: 0;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="page-header">
    <h1>virtual concert</h1>
    <p class="subtitle">the full set, on loop</p>
    <div class="marks-row" aria-hidden="true">
      <img class="m-spirit" src="feather.svg" alt="">
      <img class="m-frog"   src="frog.svg"    alt="">
      <img class="m-toad"   src="toad.svg"    alt="">
    </div>
  </div>

  <audio id="audio" preload="none"></audio>

  <button id="start-btn">start concert</button>

  <p class="now-playing">
    now playing
    <span class="current" id="current-title">loading…</span>
  </p>

  <ul class="setlist" id="setlist"></ul>

  <p class="loop-badge" id="loop-badge"></p>

  <script>
    const audio = document.getElementById('audio');
    const currentTitle = document.getElementById('current-title');
    const setlistEl = document.getElementById('setlist');
    const loopBadge = document.getElementById('loop-badge');
    const startBtn = document.getElementById('start-btn');

    let playlist = [];
    let currentIndex = 0;
    let loopCount = 0;
    let started = false;

    fetch('songs.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        playlist = Object.entries(data.songs || {})
          .sort((a, b) => (a[1].order || 99) - (b[1].order || 99))
          .map(([slug, song]) => song);

        if (playlist.length === 0) {
          currentTitle.textContent = 'no songs yet';
          startBtn.disabled = true;
          startBtn.style.opacity = '0.4';
          return;
        }

        playlist.forEach((song, i) => {
          const li = document.createElement('li');
          li.id = 'setlist-' + i;
          const num = document.createElement('span');
          num.className = 'num';
          num.textContent = (i + 1).toString().padStart(2, '0');
          const name = document.createElement('span');
          name.style.flex = '1';
          name.textContent = song.title;
          li.appendChild(num);
          li.appendChild(name);
          li.addEventListener('click', () => { if (started) playSong(i); });
          setlistEl.appendChild(li);
        });

        currentTitle.textContent = 'ready';
      })
      .catch(() => { currentTitle.textContent = 'failed to load'; });

    function updateSetlist() {
      playlist.forEach((_, i) => {
        const li = document.getElementById('setlist-' + i);
        li.className = '';
        if (i < currentIndex) li.className = 'played';
        if (i === currentIndex) li.className = 'active';
      });
    }

    function playSong(index) {
      currentIndex = index;
      const song = playlist[index];
      currentTitle.textContent = song.title;
      updateSetlist();
      audio.src = song.audio;
      audio.play();
    }

    function playNext() {
      currentIndex++;
      if (currentIndex >= playlist.length) {
        currentIndex = 0;
        loopCount++;
        loopBadge.textContent = 'loop ' + (loopCount + 1);
      }
      playSong(currentIndex);
    }

    audio.addEventListener('ended', () => { if (started) playNext(); });

    startBtn.addEventListener('click', () => {
      if (playlist.length === 0) return;
      if (!started) {
        started = true;
        loopCount = 0;
        loopBadge.textContent = 'loop 1';
        startBtn.textContent = 'restart';
        playSong(0);
      } else {
        loopCount = 0;
        loopBadge.textContent = 'loop 1';
        playSong(0);
      }
    });
  </script>
</body>
</html>
