<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>virtual concert · mojo trio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      padding: 4rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    #video-wrapper {
      width: min(560px, 92vw);
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid var(--line-strong);
    }
    #video-wrapper iframe { width: 100%; height: 100%; border: 0; display: block; }

    #start-btn {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      padding: 0.55rem 1.8rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    #start-btn:hover { color: var(--ember); border-color: var(--ember); }

    .now-playing {
      font-family: var(--font-serif);
      font-style: italic;
      text-align: center;
      color: var(--ink-mute);
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
    }
    .now-playing .current {
      display: block;
      color: var(--ember);
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      font-style: italic;
      margin-top: 0.2rem;
    }

    .setlist {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0;
      width: min(420px, 92vw);
    }
    .setlist li {
      font-family: var(--font-serif);
      font-size: 1rem;
      color: var(--ink-mute);
      padding: 0.45rem 0.6rem;
      border-bottom: 1px solid var(--line);
      transition: color 0.3s ease, opacity 0.3s ease;
      font-style: italic;
    }
    .setlist li.played { color: var(--ink-faint); opacity: 0.6; }
    .setlist li.active { color: var(--ember); font-style: normal; }

    .loop-badge {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      text-align: center;
      min-height: 1.2em;
      margin: 0;
    }
  </style>
</head>
<body>
  <svg class="smoke-defs" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="smoke-warp" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.024" numOctaves="2" seed="2" stitchTiles="stitch" result="noise">
          <animate attributeName="seed" values="2;120" dur="80s" repeatCount="indefinite"/>
          <animate attributeName="baseFrequency" values="0.012 0.024;0.018 0.030;0.012 0.024" dur="34s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="65"/>
      </filter>
    </defs>
  </svg>
  <div class="smoke smoke-bg" aria-hidden="true">
    <span class="plume w1"></span>
    <span class="plume w2"></span>
    <span class="plume w3"></span>
    <span class="plume w4"></span>
    <span class="plume w5"></span>
  </div>
  <div class="smoke smoke-fg" aria-hidden="true">
    <span class="plume w1"></span>
    <span class="plume w2"></span>
    <span class="plume w3"></span>
  </div>
  <a class="back" href="index.html">← back</a>

  <div class="page-header">
    <h1>virtual concert</h1>
    <p class="subtitle">full set, on loop</p>
    <div class="marks-row" aria-hidden="true">
      <img class="m-spirit" src="feather.svg" alt="">
      <img class="m-frog"   src="frog.svg"    alt="">
      <img class="m-toad"   src="toad.svg"    alt="">
    </div>
  </div>

  <div id="video-wrapper">
    <div id="player"></div>
  </div>

  <button id="start-btn">start concert</button>

  <p class="now-playing">
    now playing
    <span class="current" id="current-title">loading…</span>
  </p>

  <ul class="setlist" id="setlist"></ul>

  <p class="loop-badge" id="loop-badge"></p>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;
    let playerReady = false;
    let playlist = [];
    let currentIndex = 0;
    let loopCount = 0;
    let started = false;
    let currentEndTime = null;
    let endCheckInterval = null;

    const currentTitle = document.getElementById('current-title');
    const setlistEl = document.getElementById('setlist');
    const loopBadge = document.getElementById('loop-badge');
    const startBtn = document.getElementById('start-btn');

    function parseTime(t) {
      const parts = t.split(':');
      if (parts.length === 1) return parseFloat(parts[0]) || 0;
      if (parts.length === 3) return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseFloat(parts[2]);
      return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
    }

    function getSongBounds(song) {
      return {
        start: song.concertStart ? parseTime(song.concertStart) : 0,
        end: song.concertEnd ? parseTime(song.concertEnd) : null
      };
    }

    fetch('songs.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        playlist = Object.entries(data.songs || {})
          .sort((a, b) => (a[1].order || 99) - (b[1].order || 99))
          .map(([slug, song]) => song);

        if (playlist.length === 0) {
          currentTitle.textContent = 'no songs yet';
          startBtn.disabled = true;
          startBtn.style.opacity = '0.4';
          return;
        }

        playlist.forEach((song, i) => {
          const li = document.createElement('li');
          const parts = song.title.split(' — ');
          li.textContent = parts.length === 2 ? parts[1] : song.title;
          li.id = 'setlist-' + i;
          setlistEl.appendChild(li);
        });

        currentTitle.textContent = 'ready';
        initPlayer();
      })
      .catch(() => { currentTitle.textContent = 'failed to load'; });

    function initPlayer() {
      const firstBounds = getSongBounds(playlist[0]);
      window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player('player', {
          width: '100%', height: '100%',
          videoId: playlist[0].videoId,
          playerVars: {
            origin: window.location.origin,
            rel: 0, controls: 1, playsinline: 1,
            start: Math.floor(firstBounds.start)
          },
          events: {
            onReady: () => { playerReady = true; },
            onStateChange: (event) => {
              if (event.data === YT.PlayerState.ENDED && started) playNext();
            },
            onError: (event) => {
              currentTitle.textContent = 'video error (' + event.data + ')';
              console.error('YouTube error:', event.data);
            }
          }
        });
      };
      if (window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
    }

    function updateSetlist() {
      playlist.forEach((_, i) => {
        const li = document.getElementById('setlist-' + i);
        li.className = '';
        if (i < currentIndex) li.className = 'played';
        if (i === currentIndex) li.className = 'active';
      });
    }

    function playSong(index, isFirstPlay) {
      currentIndex = index;
      const song = playlist[currentIndex];
      const bounds = getSongBounds(song);
      currentEndTime = bounds.end;
      const parts = song.title.split(' — ');
      currentTitle.textContent = parts.length === 2 ? parts[1] : song.title;
      updateSetlist();
      if (isFirstPlay) {
        player.seekTo(bounds.start, true);
        player.playVideo();
      } else {
        player.loadVideoById({ videoId: song.videoId, startSeconds: bounds.start });
      }
    }

    function playNext() {
      currentIndex++;
      if (currentIndex >= playlist.length) {
        currentIndex = 0;
        loopCount++;
        loopBadge.textContent = 'loop ' + (loopCount + 1);
      }
      playSong(currentIndex, false);
    }

    function checkEnd() {
      if (!started || currentEndTime === null) return;
      try { if (player.getCurrentTime() >= currentEndTime) playNext(); } catch (e) {}
    }

    startBtn.addEventListener('click', () => {
      if (!playerReady || playlist.length === 0) return;
      if (!started) {
        started = true;
        loopCount = 0;
        loopBadge.textContent = 'loop 1';
        startBtn.textContent = 'restart';
        playSong(0, true);
        if (!endCheckInterval) endCheckInterval = setInterval(checkEnd, 500);
      } else {
        currentIndex = 0;
        loopCount = 0;
        loopBadge.textContent = 'loop 1';
        playSong(0, false);
      }
    });
  </script>
</body>
</html>
