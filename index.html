<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mojo trio</title>
  <meta name="description" content="mojo trio practice site">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
<header>
    <h1>mojo trio</h1>
    <p class="subtitle">backup band for featured local artists</p>
    <div class="marks" aria-hidden="true">
      <img class="mark-spirit" src="feather.svg" alt="">
      <img class="mark-frog"   src="frog.svg"    alt="">
      <img class="mark-toad"   src="toad.svg"    alt="">
    </div>
  </header>

  <main id="concerts"></main>

  <nav class="tools">
    <a href="drone.html">drone</a>
    <a href="concert.html">virtual concert</a>
  </nav>

  <footer>mojo trio</footer>

  <script>
    fetch('songs.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        const container = document.getElementById('concerts');
        const concertMeta = data.concerts || {};
        const entries = Object.entries(data.songs || {});

        if (entries.length === 0) {
          const p = document.createElement('p');
          p.className = 'empty';
          p.innerHTML = 'songs coming soon<span class="empty-sub">add tracks to <code>songs.json</code></span>';
          container.appendChild(p);
          return;
        }

        const concerts = {};
        entries.forEach(([slug, song]) => {
          const concert = song.concert || 'uncategorized';
          if (!concerts[concert]) concerts[concert] = [];
          concerts[concert].push([slug, song]);
        });

        let delay = 0.4;
        for (const [concert, songs] of Object.entries(concerts)) {
          const section = document.createElement('div');
          section.className = 'concert';
          section.style.animationDelay = delay + 's';
          delay += 0.15;

          const header = document.createElement('div');
          header.className = 'concert-header';

          const meta = concertMeta[concert];
          const h2 = document.createElement('h2');
          h2.className = 'concert-name';
          h2.textContent = meta ? meta.name : concert;
          header.appendChild(h2);

          if (meta && meta.date) {
            const dateSpan = document.createElement('span');
            dateSpan.className = 'concert-date';
            dateSpan.textContent = meta.date;
            header.appendChild(dateSpan);
          }

          section.appendChild(header);

          const ul = document.createElement('ul');
          ul.className = 'song-list';
          songs.sort((a, b) => (a[1].order || 99) - (b[1].order || 99));
          songs.forEach(([slug, song]) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = 'song.html?s=' + encodeURIComponent(slug);

            const parts = song.title.split(' — ');
            if (parts.length === 2) {
              const artistSpan = document.createElement('span');
              artistSpan.className = 'song-artist';
              artistSpan.textContent = parts[0];
              a.appendChild(artistSpan);
              a.appendChild(document.createTextNode(parts[1]));
            } else {
              a.textContent = song.title;
            }

            li.appendChild(a);
            ul.appendChild(li);
          });

          section.appendChild(ul);
          container.appendChild(section);
        }
      })
      .catch(() => {
        const container = document.getElementById('concerts');
        const p = document.createElement('p');
        p.className = 'empty';
        p.textContent = 'failed to load songs';
        container.appendChild(p);
      });
  </script>
</body>
</html>
