<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mojo trio · practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="hero hero-compact">
    <div class="eyebrow">
      <span class="dot"></span>
      <span>practice room</span>
    </div>
    <h1 class="wordmark">
      <span class="word word-1">mojo</span>
      <span class="word word-2">trio</span>
    </h1>
    <p class="tagline">music we're working on</p>
  </header>

  <main class="practice">
    <section class="section section-flush">
      <div id="concerts"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <span class="section-num">·</span>
        <h2 class="section-title">tools</h2>
      </div>
      <div class="card-grid card-grid-tools">
        <a href="drone.html" class="card card-tool">
          <span class="card-tag">tool</span>
          <h3 class="card-title">drone</h3>
          <p class="card-meta">sustained cello tone — tune up, hold the room</p>
          <span class="card-arrow" aria-hidden="true">→</span>
        </a>
        <a href="concert.html" class="card card-tool">
          <span class="card-tag">tool</span>
          <h3 class="card-title">virtual concert</h3>
          <p class="card-meta">play the full set in order, on loop</p>
          <span class="card-arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </section>
  </main>

  <div class="page-mark" aria-hidden="true">
    <svg class="mark-icon mark-spirit" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50,14 C58,28 70,42 70,60 C70,77 62,86 50,88 C38,86 30,77 30,60 C30,42 42,28 50,14 Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M50,72 C46,68 47,62 50,58" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="48" r="2.6" fill="currentColor"/>
    </svg>
    <svg class="mark-icon mark-frog" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M24,58 Q24,82 50,84 Q76,82 76,58 Q76,44 62,40 L38,40 Q24,44 24,58 Z"/>
        <circle cx="38" cy="34" r="8"/>
        <circle cx="62" cy="34" r="8"/>
        <path d="M40,60 Q50,68 60,60"/>
        <path d="M24,64 Q14,70 18,80"/>
        <path d="M76,64 Q86,70 82,80"/>
      </g>
      <circle cx="38" cy="36" r="2.8" fill="currentColor"/>
      <circle cx="62" cy="36" r="2.8" fill="currentColor"/>
    </svg>
    <svg class="mark-icon mark-toad" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14,66 Q14,86 50,86 Q86,86 86,66 Q86,54 72,50 L28,50 Q14,54 14,66 Z"/>
        <circle cx="34" cy="46" r="6.5"/>
        <circle cx="66" cy="46" r="6.5"/>
        <path d="M42,67 L58,67"/>
        <path d="M14,72 Q6,76 12,84"/>
        <path d="M86,72 Q94,76 88,84"/>
      </g>
      <circle cx="34" cy="47" r="2.3" fill="currentColor"/>
      <circle cx="66" cy="47" r="2.3" fill="currentColor"/>
      <circle cx="40" cy="60" r="1.4" fill="currentColor"/>
      <circle cx="50" cy="56" r="1.4" fill="currentColor"/>
      <circle cx="60" cy="60" r="1.4" fill="currentColor"/>
      <circle cx="44" cy="72" r="1.4" fill="currentColor"/>
      <circle cx="56" cy="72" r="1.4" fill="currentColor"/>
    </svg>
  </div>

  <footer>
    <div class="footer-mark">mojo trio</div>
    <div class="footer-meta">© <span id="year"></span></div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <script>
    fetch('songs.json')
      .then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(data => {
        const container = document.getElementById('concerts');
        const concertMeta = data.concerts || {};
        const entries = Object.entries(data.songs || {});

        if (entries.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.innerHTML = '<p class="empty-title">no songs yet</p>'
            + '<p class="empty-sub">add tracks to <code>songs.json</code> to start practicing</p>';
          container.appendChild(empty);
          return;
        }

        // Group by concert
        const concerts = {};
        entries.forEach(([slug, song]) => {
          const concert = song.concert || 'uncategorized';
          if (!concerts[concert]) concerts[concert] = [];
          concerts[concert].push([slug, song]);
        });

        let delay = 0.1;
        for (const [concert, songs] of Object.entries(concerts)) {
          const section = document.createElement('div');
          section.className = 'concert';
          section.style.animationDelay = delay + 's';
          delay += 0.1;

          const header = document.createElement('div');
          header.className = 'concert-header';

          const meta = concertMeta[concert];
          const h2 = document.createElement('h2');
          h2.className = 'concert-name';
          h2.textContent = meta ? meta.name : concert;
          header.appendChild(h2);

          if (meta && meta.date) {
            const dateSpan = document.createElement('span');
            dateSpan.className = 'concert-date';
            dateSpan.textContent = meta.date;
            header.appendChild(dateSpan);
          }

          section.appendChild(header);

          const ul = document.createElement('ul');
          ul.className = 'song-list';
          songs.sort((a, b) => (a[1].order || 99) - (b[1].order || 99));
          songs.forEach(([slug, song]) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = 'song.html?s=' + encodeURIComponent(slug);
            a.className = 'song-link';

            // Split artist and title on em dash if present
            const parts = song.title.split(' — ');
            if (parts.length === 2) {
              const artistSpan = document.createElement('span');
              artistSpan.className = 'song-artist';
              artistSpan.textContent = parts[0];
              const titleSpan = document.createElement('span');
              titleSpan.className = 'song-title';
              titleSpan.textContent = parts[1];
              a.appendChild(artistSpan);
              a.appendChild(titleSpan);
            } else {
              const titleSpan = document.createElement('span');
              titleSpan.className = 'song-title';
              titleSpan.textContent = song.title;
              a.appendChild(titleSpan);
            }

            const arrow = document.createElement('span');
            arrow.className = 'song-arrow';
            arrow.setAttribute('aria-hidden', 'true');
            arrow.textContent = '→';
            a.appendChild(arrow);

            li.appendChild(a);
            ul.appendChild(li);
          });

          section.appendChild(ul);
          container.appendChild(section);
        }
      })
      .catch(() => {
        const container = document.getElementById('concerts');
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<p class="empty-title">failed to load songs</p>';
        container.appendChild(empty);
      });
  </script>
</body>
</html>
