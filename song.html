<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      padding: 4rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .song-title {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(1.8rem, 4.5vw, 2.6rem);
      letter-spacing: 0.04em;
      text-transform: lowercase;
      margin: 0;
      text-align: center;
      line-height: 1.2;
    }

    .transport {
      width: min(560px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .transport-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    #play-btn {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      padding: 0.5rem 1.7rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.25s ease, border-color 0.25s ease;
      min-width: 7rem;
    }
    #play-btn:hover { color: var(--ember); border-color: var(--ember); }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--ink-mute);
      font-size: 0.95rem;
    }
    #speed-display { color: var(--ink); min-width: 3.2em; text-align: right; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 8rem;
      height: 2px;
      background: var(--line-strong);
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 0.85rem; height: 0.85rem;
      background: var(--ember); border-radius: 50%; cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 0.85rem; height: 0.85rem;
      background: var(--ember); border-radius: 50%; cursor: pointer; border: 0;
    }

    /* progress / scrubber */
    .scrubber {
      position: relative;
      width: 100%;
      height: 4px;
      background: var(--line-strong);
      cursor: pointer;
    }
    .scrubber-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: var(--ember);
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }

    /* section list */
    .sections {
      width: min(560px, 92vw);
      list-style: none;
      padding: 0;
      margin: 0.5rem 0 0;
    }
    .section {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.6rem;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .section:hover { background: rgba(235, 226, 207, 0.03); }
    .section.active .section-label { color: var(--ember); }
    .section-time {
      font-family: var(--font-serif);
      font-variant-numeric: tabular-nums;
      color: var(--ink-faint);
      font-size: 0.95rem;
      min-width: 3.2em;
    }
    .section-label {
      flex: 1;
      font-size: 1.1rem;
      color: var(--ink);
      letter-spacing: 0.01em;
    }
    .loop-btn {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink-mute);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.85rem;
      padding: 0.3rem 0.85rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .loop-btn:hover { color: var(--ember); border-color: var(--ember); }
    .loop-btn.active { color: var(--bg); background: var(--ember); border-color: var(--ember); }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="page-header">
    <h1 class="song-title" id="song-title">loading…</h1>
    <div class="marks-row" aria-hidden="true">
      <img class="m-spirit" src="feather.svg" alt="">
      <img class="m-frog"   src="frog.svg"    alt="">
      <img class="m-toad"   src="toad.svg"    alt="">
    </div>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <div class="transport">
    <div class="transport-row">
      <button id="play-btn">play</button>
      <div class="speed-control">
        <span>speed</span>
        <input id="speed" type="range" min="0.5" max="1.5" step="0.05" value="1">
        <span id="speed-display">1.00×</span>
      </div>
    </div>
    <div class="scrubber" id="scrubber"><div class="scrubber-fill" id="scrubber-fill"></div></div>
    <div class="time-row"><span id="cur-time">0:00</span><span id="dur-time">0:00</span></div>
  </div>

  <ul class="sections" id="sections"></ul>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('s');
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const speedInput = document.getElementById('speed');
    const speedDisplay = document.getElementById('speed-display');
    const scrubber = document.getElementById('scrubber');
    const scrubberFill = document.getElementById('scrubber-fill');
    const curTimeEl = document.getElementById('cur-time');
    const durTimeEl = document.getElementById('dur-time');
    const sectionsEl = document.getElementById('sections');
    const titleEl = document.getElementById('song-title');

    let loopStart = null, loopEnd = null, loopIndex = null;
    let sections = [];

    function parseTime(t) {
      const parts = String(t).split(':');
      if (parts.length === 1) return parseFloat(parts[0]) || 0;
      return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
    }
    function fmt(sec) {
      if (!isFinite(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    if (!slug) {
      titleEl.textContent = 'no song specified';
    } else {
      fetch('songs.json')
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
          const song = (data.songs || {})[slug];
          if (!song) { titleEl.textContent = 'song not found'; return; }
          document.title = song.title + ' · mojo trio';
          titleEl.textContent = song.title;
          audio.src = song.audio;

          // Normalize to sections with start (seconds) + label. Support legacy "loops".
          if (Array.isArray(song.sections)) {
            sections = song.sections.map(s => ({ label: s.label, start: parseTime(s.start) }));
          } else if (Array.isArray(song.loops)) {
            sections = song.loops.map(l => ({
              label: l.label || '',
              start: parseTime(Array.isArray(l) ? l[0] : l.start)
            }));
          }
          renderSections();
        })
        .catch(err => { console.error(err); titleEl.textContent = 'failed to load'; });
    }

    function sectionEnd(i) {
      // end of section i = start of next section, or end of track for the last
      if (i + 1 < sections.length) return sections[i + 1].start;
      return isFinite(audio.duration) ? audio.duration : Infinity;
    }

    function renderSections() {
      sectionsEl.innerHTML = '';
      sections.forEach((sec, i) => {
        const li = document.createElement('li');
        li.className = 'section';
        li.dataset.index = i;

        const time = document.createElement('span');
        time.className = 'section-time';
        time.textContent = fmt(sec.start);

        const label = document.createElement('span');
        label.className = 'section-label';
        label.textContent = sec.label;

        const loopBtn = document.createElement('button');
        loopBtn.className = 'loop-btn';
        loopBtn.textContent = 'loop';

        // Click row (not the loop button) = seek there and play, no loop
        li.addEventListener('click', (e) => {
          if (e.target === loopBtn) return;
          clearLoop();
          audio.currentTime = sec.start;
          audio.play();
        });
        loopBtn.addEventListener('click', () => toggleLoop(i));

        li.appendChild(time);
        li.appendChild(label);
        li.appendChild(loopBtn);
        sectionsEl.appendChild(li);
      });
    }

    function clearLoop() {
      loopStart = loopEnd = loopIndex = null;
      document.querySelectorAll('.loop-btn').forEach(b => {
        b.classList.remove('active');
        b.textContent = 'loop';
      });
    }

    function toggleLoop(i) {
      const btns = document.querySelectorAll('.loop-btn');
      if (loopIndex === i) { clearLoop(); audio.pause(); return; }
      clearLoop();
      loopIndex = i;
      loopStart = sections[i].start;
      loopEnd = sectionEnd(i);
      btns[i].classList.add('active');
      btns[i].textContent = 'stop';
      audio.currentTime = loopStart;
      audio.play();
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) audio.play();
      else audio.pause();
    });

    speedInput.addEventListener('input', () => {
      const r = parseFloat(speedInput.value);
      audio.playbackRate = r;
      speedDisplay.textContent = r.toFixed(2) + '×';
    });

    scrubber.addEventListener('click', (e) => {
      if (!isFinite(audio.duration)) return;
      const rect = scrubber.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      clearLoop();
      audio.currentTime = ratio * audio.duration;
    });

    audio.addEventListener('loadedmetadata', () => {
      durTimeEl.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      if (loopStart !== null && audio.currentTime >= loopEnd) {
        audio.currentTime = loopStart;
      }
      curTimeEl.textContent = fmt(audio.currentTime);
      if (isFinite(audio.duration)) {
        scrubberFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
      // highlight the active section
      let active = -1;
      for (let i = 0; i < sections.length; i++) {
        if (audio.currentTime >= sections[i].start) active = i; else break;
      }
      document.querySelectorAll('.section').forEach((el, i) => {
        el.classList.toggle('active', i === active);
      });
    });

    audio.addEventListener('play',  () => { playBtn.textContent = 'pause'; });
    audio.addEventListener('pause', () => { playBtn.textContent = 'play'; });
    audio.addEventListener('ended', () => { clearLoop(); });
  </script>
</body>
</html>
