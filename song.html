<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      padding: 4rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
    }

    .song-title {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      letter-spacing: 0.04em;
      text-transform: lowercase;
      margin: 0;
      text-align: center;
      line-height: 1.2;
    }

    .song-artist-line {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      color: var(--ink-mute);
      text-align: center;
      margin: 0 0 0.3rem;
    }

    #video-wrapper {
      width: min(560px, 92vw);
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid var(--line-strong);
    }
    #video-wrapper iframe { width: 100%; height: 100%; border: 0; display: block; }

    .controls {
      width: min(560px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      align-items: stretch;
    }

    .play-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 0.65rem 0.85rem;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--ink-mute);
      font-size: 0.95rem;
    }
    #speed-display { color: var(--ink); min-width: 3.2em; text-align: right; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 9rem;
      height: 2px;
      background: var(--line-strong);
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 0.85rem;
      height: 0.85rem;
      background: var(--ember);
      border-radius: 50%;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 0.85rem;
      height: 0.85rem;
      background: var(--ember);
      border-radius: 50%;
      cursor: pointer;
      border: 0;
    }

    #loops { display: flex; flex-direction: column; gap: 0.35rem; }

    .loop-label {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
      margin: 0.85rem 0 0.1rem;
      padding-left: 0.1rem;
    }
    .loop-label:first-child { margin-top: 0; }

    .loop {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.45rem 0.6rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
    }

    .loop label {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-mute);
    }

    .loop input[type="text"] {
      width: 4.4em;
      padding: 0.25rem 0.4rem;
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--line-strong);
      text-align: center;
      transition: border-color 0.2s ease;
    }
    .loop input[type="text"]:focus { outline: none; border-color: var(--ember); }

    button, .loop-btn {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink-mute);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.9rem;
      padding: 0.35rem 0.95rem;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: color 0.25s ease, border-color 0.25s ease;
    }
    button:hover, .loop-btn:hover {
      color: var(--ember);
      border-color: var(--ember);
    }

    .loop .loop-btn { margin-left: auto; }
    .loop .loop-btn.active { color: var(--ember); border-color: var(--ember); }

    #add-loop {
      align-self: center;
      width: 2rem;
      height: 2rem;
      padding: 0;
      font-size: 1.1rem;
      line-height: 1;
      border-radius: 50%;
      margin-top: 0.4rem;
    }

    #play-btn {
      align-self: center;
      padding: 0.55rem 1.6rem;
      color: var(--ink);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <svg class="smoke-defs" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="smoke-warp" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.024" numOctaves="2" seed="2" stitchTiles="stitch" result="noise">
          <animate attributeName="seed" values="2;120" dur="80s" repeatCount="indefinite"/>
          <animate attributeName="baseFrequency" values="0.012 0.024;0.018 0.030;0.012 0.024" dur="34s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="65"/>
      </filter>
    </defs>
  </svg>
  <div class="smoke smoke-bg" aria-hidden="true">
    <span class="plume w1"></span>
    <span class="plume w2"></span>
    <span class="plume w3"></span>
    <span class="plume w4"></span>
    <span class="plume w5"></span>
  </div>
  <div class="smoke smoke-fg" aria-hidden="true">
    <span class="plume w1"></span>
    <span class="plume w2"></span>
    <span class="plume w3"></span>
  </div>
  <a class="back" href="index.html">← back</a>

  <div class="page-header">
    <p class="song-artist-line" id="song-artist" style="display:none"></p>
    <h1 class="song-title" id="song-title">loading…</h1>
    <div class="marks-row" aria-hidden="true">
      <img class="m-spirit" src="feather.svg" alt="">
      <img class="m-frog"   src="frog.svg"    alt="">
      <img class="m-toad"   src="toad.svg"    alt="">
    </div>
  </div>

  <div id="video-wrapper">
    <div id="player"></div>
  </div>

  <div class="controls">
    <div class="play-row">
      <button id="play-btn">play piece</button>
      <div class="speed-control">
        <span>speed</span>
        <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1">
        <span id="speed-display">1.00×</span>
      </div>
    </div>
    <div id="loops"></div>
    <button id="add-loop" title="add loop">+</button>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('s');
    if (!slug) {
      document.getElementById('song-title').textContent = 'no song specified';
    } else {
      init(slug);
    }

    function init(slug) {
      let player;
      let playerReady = false;
      let loopActive = false;
      let playActive = false;
      let currentLoopIndex = null;
      let loops = [];

      const loopsContainer = document.getElementById('loops');
      const addLoopBtn = document.getElementById('add-loop');
      const playBtn = document.getElementById('play-btn');
      const speedInput = document.getElementById('speed');
      const speedDisplay = document.getElementById('speed-display');

      function parseTime(t) {
        const parts = t.split(':');
        if (parts.length === 1) return parseFloat(parts[0]) || 0;
        if (parts.length === 3) return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseFloat(parts[2]);
        return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
      }

      function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      }

      function createLoopElement(startVal, endVal, label) {
        if (label) {
          const labelDiv = document.createElement('div');
          labelDiv.className = 'loop-label';
          labelDiv.textContent = label;
          loopsContainer.appendChild(labelDiv);
        }
        const div = document.createElement('div');
        div.className = 'loop';

        const startLabel = document.createElement('label');
        startLabel.textContent = 'start ';
        const startInput = document.createElement('input');
        startInput.type = 'text';
        startInput.className = 'start';
        startInput.value = startVal;
        startLabel.appendChild(startInput);

        const endLabel = document.createElement('label');
        endLabel.textContent = 'end ';
        const endInput = document.createElement('input');
        endInput.type = 'text';
        endInput.className = 'end';
        endInput.value = endVal;
        endLabel.appendChild(endInput);

        const btn = document.createElement('button');
        btn.textContent = 'loop';
        btn.className = 'loop-btn';
        const index = loops.length;
        btn.addEventListener('click', () => handleLoopButton(index));

        div.appendChild(startLabel);
        div.appendChild(endLabel);
        div.appendChild(btn);
        loopsContainer.appendChild(div);

        loops.push({ start: startInput, end: endInput, button: btn });
      }

      function stopLoop() {
        if (currentLoopIndex !== null) {
          loops[currentLoopIndex].button.textContent = 'loop';
          loops[currentLoopIndex].button.classList.remove('active');
        }
        if (player && loopActive) player.pauseVideo();
        loopActive = false;
        currentLoopIndex = null;
      }

      function startLoop(i) {
        if (!playerReady) return;
        playActive = false;
        playBtn.textContent = 'play piece';
        player.pauseVideo();
        currentLoopIndex = i;
        const start = parseTime(loops[i].start.value);
        player.seekTo(start, true);
        player.playVideo();
        loops[i].button.textContent = 'stop';
        loops[i].button.classList.add('active');
        loopActive = true;
      }

      function checkLoop() {
        if (!loopActive || currentLoopIndex === null) return;
        try {
          const start = parseTime(loops[currentLoopIndex].start.value);
          const end = parseTime(loops[currentLoopIndex].end.value);
          if (end <= start) return;
          if (player.getCurrentTime() >= end) player.seekTo(start, true);
        } catch (e) {}
      }

      function handleLoopButton(i) {
        if (loopActive && currentLoopIndex === i) stopLoop();
        else { stopLoop(); startLoop(i); }
      }

      addLoopBtn.addEventListener('click', () => {
        if (loops.length === 0) { createLoopElement('0:00', '0:10'); return; }
        const last = loops[loops.length - 1];
        const startVal = last.end.value;
        const startSec = parseTime(startVal);
        createLoopElement(startVal, formatTime(startSec + 10));
      });

      playBtn.addEventListener('click', () => {
        if (!playerReady) return;
        if (!playActive) {
          stopLoop();
          player.seekTo(0, true);
          player.playVideo();
          playBtn.textContent = 'stop';
          playActive = true;
        } else {
          player.pauseVideo();
          playBtn.textContent = 'play piece';
          playActive = false;
        }
      });

      speedInput.addEventListener('input', () => {
        if (!playerReady) return;
        const r = parseFloat(speedInput.value);
        player.setPlaybackRate(r);
        speedDisplay.textContent = r.toFixed(2) + '×';
      });

      fetch('songs.json')
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
          const song = (data.songs || {})[slug];
          if (!song) { document.getElementById('song-title').textContent = 'song not found'; return; }

          document.title = song.title + ' · mojo trio';

          const parts = song.title.split(' — ');
          const artistEl = document.getElementById('song-artist');
          const titleEl = document.getElementById('song-title');
          if (parts.length === 2) {
            artistEl.textContent = parts[0];
            artistEl.style.display = 'block';
            titleEl.textContent = parts[1];
          } else {
            titleEl.textContent = song.title;
          }

          (song.loops || []).forEach((loop) => {
            const start = Array.isArray(loop) ? loop[0] : loop.start;
            const end = Array.isArray(loop) ? loop[1] : loop.end;
            const label = Array.isArray(loop) ? null : loop.label;
            createLoopElement(start, end, label);
          });

          let loopTimer = null;
          window.onYouTubeIframeAPIReady = function () {
            player = new YT.Player('player', {
              width: '100%',
              height: '100%',
              videoId: song.videoId,
              playerVars: { origin: window.location.origin, rel: 0 },
              events: {
                onReady: () => { playerReady = true; },
                onStateChange: (event) => {
                  clearInterval(loopTimer);
                  if (event.data === YT.PlayerState.PLAYING && loopActive) {
                    loopTimer = setInterval(checkLoop, 200);
                  } else if (event.data === YT.PlayerState.ENDED) {
                    playActive = false;
                    playBtn.textContent = 'play piece';
                  }
                },
                onError: () => {
                  playerReady = false;
                  stopLoop();
                  playActive = false;
                  playBtn.textContent = 'play piece';
                }
              }
            });
          };
          if (window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
        })
        .catch(err => {
          console.error('Failed to load songs.json:', err);
          document.getElementById('song-title').textContent = 'failed to load';
        });
    }
  </script>
</body>
</html>
